services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fuel_dispatch
      POSTGRES_USER: fuel_user
      POSTGRES_PASSWORD: fuel_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuel_user -d fuel_dispatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fuel_user:fuel_password@db:5432/fuel_dispatch
    volumes:
      - ./backend:/app
      - ./final_fuel_stations.csv:/final_fuel_stations.csv:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
